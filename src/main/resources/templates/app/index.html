<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Minha conta — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="activate-layout">
  <div class="card" style="max-width: 480px; text-align: center;">

    <span class="brand-label">ad-screen</span>
    <h1 class="mt-2">Área do cliente</h1>
    <p class="text-muted mt-2">Esta área está em construção.</p>

    <hr class="divider"/>

    <a th:href="@{/activate}" class="btn btn-primary w-full">Ativar dispositivo</a>

    <div class="text-center mt-2">
      <a href="#" onclick="logout()" style="font-size: 14px; color: #6b7280;">Sair</a>
    </div>

  </div>
</div>
<script>
  async function logout() {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  }
</script>
</body>
</html>
