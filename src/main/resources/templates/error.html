<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Erro — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="activate-layout">
  <div class="card" style="max-width: 420px; text-align: center;">

    <span class="brand-label">ad-screen</span>

    <div style="font-size: 64px; font-weight: 700; color: #e5e7eb; margin: 16px 0 8px;">
      <span th:text="${code}">erro</span>
    </div>

    <h1 class="mt-2" th:text="${title}">Algo deu errado</h1>
    <p class="text-muted mt-2" th:text="${message}">Ocorreu um erro inesperado.</p>

    <hr class="divider"/>

    <a th:href="@{/}" class="btn btn-primary w-full">Voltar ao início</a>

  </div>
</div>
</body>
</html>
