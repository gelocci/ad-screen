<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Criar conta — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="activate-layout">
  <div class="card" style="max-width: 420px;">

    <div class="text-center mb-2">
      <span class="brand-label">ad-screen</span>
      <h1 class="mt-2">Criar conta</h1>
      <p class="text-muted">Preencha os dados para começar.</p>
    </div>

    <hr class="divider"/>

    <div th:if="${error}" class="alert alert-danger mb-2" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success mb-2" th:text="${success}"></div>

    <form method="post" th:action="@{/register}" autocomplete="off">
      <div class="form-group">
        <label for="organizationName">Nome da organização</label>
        <input type="text" id="organizationName" name="organizationName"
               th:value="${request?.organizationName()}"
               autocomplete="organization" required/>
      </div>

      <div class="form-group">
        <label for="name">Seu nome</label>
        <input type="text" id="name" name="name"
               th:value="${request?.name()}"
               autocomplete="name" required/>
      </div>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email"
               th:value="${request?.email()}"
               autocomplete="username" required/>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password"
               autocomplete="new-password" required/>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary w-full">Criar conta</button>
      </div>
    </form>

    <hr class="divider"/>

    <div class="text-center">
      <a th:href="@{/}" style="font-size: 14px; color: #6b7280;">
        Já tem conta? Entrar
      </a>
    </div>

  </div>
</div>
</body>
</html>
