<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="brand">ad-screen</div>
    <nav>
      <a th:href="@{/admin}" class="active">Dashboard</a>
      <a th:href="@{/admin/organizations}" th:if="${superAdmin}">Organizações</a>
      <a th:href="@{/admin/users}">Usuários</a>
      <a th:href="@{/admin/screens}">Telas</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="logout()">Sair</a>
    </div>
  </aside>
  <main class="admin-main">

    <div th:if="${!superAdmin and userOrgs != null and #lists.size(userOrgs) > 1}"
         style="margin-bottom: 24px;">
      <form method="get" th:action="@{/admin/org/switch}">
        <label style="font-size:13px; color:#6b7280; margin-right:8px;">Organização:</label>
        <select name="orgId" onchange="this.form.submit()"
                style="padding:6px 10px; border-radius:8px; border:1px solid #e5e7eb; font-size:14px;">
          <option th:each="org : ${userOrgs}"
                  th:value="${org.id}"
                  th:text="${org.name}"
                  th:selected="${currentOrg != null and org.id == currentOrg.id}">
          </option>
        </select>
      </form>
    </div>

    <div class="admin-header">
      <h1>Dashboard</h1>
      <p th:text="${superAdmin} ? 'Visão geral do sistema.' : 'Visão geral de ' + ${currentOrg?.name}">
        Visão geral do sistema.
      </p>
    </div>

    <div class="summary-grid">
      <div class="summary-card" th:if="${superAdmin}">
        <div class="label">Organizações</div>
        <div class="value" th:text="${totalOrganizations}">0</div>
      </div>
      <div class="summary-card" th:if="${superAdmin}">
        <div class="label">Usuários</div>
        <div class="value" th:text="${totalUsers}">0</div>
      </div>
      <div class="summary-card">
        <div class="label">Telas ativas</div>
        <div class="value" th:text="${activeScreens}">0</div>
      </div>
      <div class="summary-card">
        <div class="label">Telas pendentes</div>
        <div class="value" th:text="${pendingScreens}">0</div>
      </div>
    </div>
  </main>
</div>
<script>
  async function logout() {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  }
</script>
</body>
</html>
