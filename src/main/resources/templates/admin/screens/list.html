<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Telas — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="brand">ad-screen</div>
    <nav>
      <a th:href="@{/admin}">Dashboard</a>
      <a th:href="@{/admin/organizations}" th:if="${superAdmin}">Organizações</a>
      <a th:href="@{/admin/users}">Usuários</a>
      <a th:href="@{/admin/screens}" class="active">Telas</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="logout()">Sair</a>
    </div>
  </aside>
  <main class="admin-main">

    <div th:if="${!superAdmin and userOrgs != null and #lists.size(userOrgs) > 1}"
         style="margin-bottom: 24px;">
      <form method="get" th:action="@{/admin/org/switch}">
        <label style="font-size:13px; color:#6b7280; margin-right:8px;">Organização:</label>
        <select name="orgId" onchange="this.form.submit()"
                style="padding:6px 10px; border-radius:8px; border:1px solid #e5e7eb; font-size:14px;">
          <option th:each="org : ${userOrgs}"
                  th:value="${org.id}"
                  th:text="${org.name}"
                  th:selected="${currentOrg != null and org.id == currentOrg.id}">
          </option>
        </select>
      </form>
    </div>

    <div class="admin-header">
      <h1>Telas</h1>
      <p th:text="${superAdmin} ? 'Todas as telas do sistema.' : 'Telas de ' + ${currentOrg?.name}">
      </p>
    </div>

    <div class="table-wrapper">
      <div class="table-toolbar">
        <h2>Lista de telas</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th th:if="${superAdmin}">Organização</th>
            <th>Status</th>
            <th>Criado em</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="screen : ${screens}">
            <td th:text="${screen.name}"></td>
            <td th:if="${superAdmin}"
                th:text="${screen.organization != null} ? ${screen.organization.name} : '—'">
            </td>
            <td>
              <span class="badge"
                    th:classappend="'badge-' + ${screen.status.name().toLowerCase()}"
                    th:text="${screen.status}">
              </span>
            </td>
            <td th:text="${#temporals.format(screen.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
          </tr>
          <tr th:if="${#lists.isEmpty(screens)}">
            <td colspan="4" class="text-center text-muted">Nenhuma tela registrada.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script>
  async function logout() {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  }
</script>
</body>
</html>
