<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nova organização — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="brand">ad-screen</div>
    <nav>
      <a th:href="@{/admin}">Dashboard</a>
      <a th:href="@{/admin/organizations}" th:if="${superAdmin}" class="active">Organizações</a>
      <a th:href="@{/admin/users}">Usuários</a>
      <a th:href="@{/admin/screens}">Telas</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="logout()">Sair</a>
    </div>
  </aside>
  <main class="admin-main">
    <div class="admin-header">
      <h1>Nova organização</h1>
      <p>Preencha os dados para cadastrar uma nova organização.</p>
    </div>

    <div th:if="${error}" class="alert alert-danger mb-2" th:text="${error}"></div>

    <form class="admin-form" method="post" th:action="@{/admin/organizations}">
      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" autocomplete="off" required/>
      </div>
      <div class="actions">
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/admin/organizations}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </main>
</div>
<script>
  async function logout() {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  }
</script>
</body>
</html>
