<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Usuários — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="brand">ad-screen</div>
    <nav>
      <a th:href="@{/admin}">Dashboard</a>
      <a th:href="@{/admin/organizations}" th:if="${superAdmin}">Organizações</a>
      <a th:href="@{/admin/users}" class="active">Usuários</a>
      <a th:href="@{/admin/screens}">Telas</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="logout()">Sair</a>
    </div>
  </aside>
  <main class="admin-main">

    <div th:if="${!superAdmin and userOrgs != null and #lists.size(userOrgs) > 1}"
         style="margin-bottom: 24px;">
      <form method="get" th:action="@{/admin/org/switch}">
        <label style="font-size:13px; color:#6b7280; margin-right:8px;">Organização:</label>
        <select name="orgId" onchange="this.form.submit()"
                style="padding:6px 10px; border-radius:8px; border:1px solid #e5e7eb; font-size:14px;">
          <option th:each="org : ${userOrgs}"
                  th:value="${org.id}"
                  th:text="${org.name}"
                  th:selected="${currentOrg != null and org.id == currentOrg.id}">
          </option>
        </select>
      </form>
    </div>

    <div class="admin-header">
      <h1>Usuários</h1>
      <p th:text="${superAdmin} ? 'Gerencie os usuários do sistema.' : 'Usuários de ' + ${currentOrg?.name}">
      </p>
    </div>

    <div th:if="${success}" class="alert alert-success mb-2" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger mb-2" th:text="${error}"></div>

    <div class="table-wrapper">
      <div class="table-toolbar">
        <h2>Lista de usuários</h2>
        <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">Novo usuário</a>
      </div>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Status</th>
            <th>Criado em</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="user : ${users}">
            <td th:text="${user.name}"></td>
            <td th:text="${user.email}"></td>
            <td>
              <span class="badge"
                    th:classappend="${user.active} ? 'badge-active' : 'badge-inactive'"
                    th:text="${user.active} ? 'Ativo' : 'Inativo'">
              </span>
            </td>
            <td th:text="${#temporals.format(user.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
          </tr>
          <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="4" class="text-center text-muted">Nenhum usuário cadastrado.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
<script>
  async function logout() {
    await fetch('/auth/logout', { method: 'POST' });
    window.location.href = '/';
  }
</script>
</body>
</html>
