<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Entrar — ad-screen</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<div class="activate-layout">
  <div class="card card-login">
    <div class="text-center mb-2">
      <span class="brand-label">ad-screen</span>
      <h1 class="mt-2">Entrar</h1>
      <p class="text-muted">Faça login para continuar a ativação do dispositivo.</p>
    </div>

    <hr class="divider"/>

    <div th:if="${param.error}" class="alert alert-danger mb-2">
      Usuário ou senha inválidos.
    </div>

    <div th:if="${param.logout}" class="alert alert-success mb-2">
      Sessão encerrada com sucesso.
    </div>

    <form method="post" th:action="@{/login}">
      <div class="form-group">
        <label for="username">E-mail</label>
        <input type="text" id="username" name="username" autocomplete="username" required/>
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required/>
      </div>

      <div class="actions">
        <button type="submit" class="btn btn-primary w-full">Entrar</button>
      </div>
    </form>
  </div>
</div>
</body>
</html>
